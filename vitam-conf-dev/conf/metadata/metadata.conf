workspaceUrl: http://workspace.service.consul:8201/
urlProcessing: http://processing.service.consul:8203/

# Archive Unit Profile cache settings (max entries in cache & retention timeout in seconds)
archiveUnitProfileCacheMaxEntries: 100
archiveUnitProfileCacheTimeoutInSeconds: 300

# Schema validator cache settings (max entries in cache & retention timeout in seconds)
schemaValidatorCacheMaxEntries: 100
schemaValidatorCacheTimeoutInSeconds: 300

# DIP purge service (in minutes)
dipTimeToLiveInMinutes: 10080 # 7 days
criticalDipTimeToLiveInMinutes: 1440 # 1 day

# TRANSFER purge service (in minutes)
transfersSIPTimeToLiveInMinutes: 10080 # 7 days

# Units and Objects Stream Threshold
unitsStreamThreshold: 1_000_000 # 1 million units
objectsStreamThreshold: 1_000_000 # 1 million units
unitsStreamExecutionLimit: 3 # 3 times
objectsStreamExecutionLimit: 3 # 3 times

# Do not have delay, in dev, for reconstruction
persistentIdentifierReconstructionDelayInMinutes: 0

# Configuration MongoDB
mongoDbNodes:
- dbHost: localhost
  dbPort: 27017
dbName: metadata
dbAuthentication: true
dbUserName: metadata
dbPassword: azerty1

contextPath: /metadata

jettyConfig: jetty-config.xml

# ElasticSearch
clusterName: elasticsearch-data
elasticsearchConfigurationFile: elasticsearch-settings/elasticsearch-configuration.json
elasticsearchNodes:
- hostName: localhost
  httpPort: 9200

# ElasticSearch tenant indexation
elasticsearchTenantIndexation:
  default_config:
    unit:
      number_of_shards: 2
      number_of_replicas: 0
    objectgroup:
      number_of_shards: 2
      number_of_replicas: 0
  dedicated_tenants:
    - tenants: '2, 3'
      unit:
        number_of_shards: 3
        number_of_replicas: 0
      objectgroup:
        number_of_shards: 3
        number_of_replicas: 0
  grouped_tenants:
    - name: 'grp1'
      tenants: '5-10'
      unit:
        number_of_shards: 1
        number_of_replicas: 0
      objectgroup:
        number_of_shards: 1
        number_of_replicas: 0

elasticsearchExternalMetadataMappings:
- collection: Unit
  mappingFile: mapping/unit-es-mapping.json
- collection: ObjectGroup
  mappingFile: mapping/og-es-mapping.json

#Basic Authentication
adminBasicAuth:
- userName: adminUser
  password: adminPassword

# Metadata Consistency Audit (Experimental / Not for Production)
isDataConsistencyAuditRunnable: false
enableDataConsistencyRectificationMode: false
dataConsistencyAuditOplogMaxSize: 100

refreshElasticIndexPostBulkIndexing: true
mongodShardsConf:
 dbUserName: vitamdb-localadmin
 dbPassword: qwerty
 mongoDbShards:
   - shardName: shard0
     mongoDbNodes:
       - dbHost: localhost
         dbPort: 27019
