secret : vitamsecret
filterActivation : false
tenants:  [ 0, 1, 2]
adminTenant : 1

distributionThreshold : 100000
eliminationAnalysisThreshold : 100000
eliminationActionThreshold : 10000
computedInheritedRulesThreshold : 100000000

indexInheritedRulesWithAPIV2OutputByTenant: [ "1" ]
indexInheritedRulesWithRulesIdByTenant: [ "1", "2" ]

classificationLevel :
  allowList: ["Secret Défense", "Confidentiel Défense"]
  authorizeNotDefined: true

binarySizePlatformThreshold: # 100 Mo
 limit: 100
 sizeUnit: MEGABYTE
binarySizeTenantThreshold: # for tenant 0 max dip/transfer size is 20 Mo, true means can exceed tenant threshold.
  - tenant: 0
    limit: 20
    sizeUnit: MEGABYTE
    authorize: true


eliminationReportExtraFields:
 - tenant: 0
   metadataFields: [ "FilePlanPosition", "SystemId", "OriginatingSystemId", "ArchivalAgencyArchiveUnitIdentifier", "OriginatingAgencyArchiveUnitIdentifier", "TransferringAgencyArchiveUnitIdentifier" ]
 - tenant: 1
   metadataFields: [ "SystemId" ]

ingestReportUnitExtraFields:
  - tenant: 0
    metadataFields: [ "FilePlanPosition", "OriginatingSystemId", "ArchivalAgencyArchiveUnitIdentifier", "OriginatingAgencyArchiveUnitIdentifier", "TransferringAgencyArchiveUnitIdentifier", "PersistentIdentifier" ]
  - tenant: 1
    metadataFields: [ "FilePlanPosition" ]

ingestReportObjectExtraFields:
  - tenant: 0
    metadataFields: [ "PersistentIdentifier" ]
  - tenant: 1
    metadataFields: [ "PersistentIdentifier" ]
