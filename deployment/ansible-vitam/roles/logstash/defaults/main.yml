---

# HOTFIX: Workaround for logstash package which is actually a "1:8.17.1-1" on Debian, and "8.17.1" for Redhat-family
logstash_version: "{{ '1:' if ansible_os_family == 'Debian' else '' }}{{ logstash.version | default('8.17.1') }}{{ '-1' if ansible_os_family == 'Debian' else '' }}"
logstash_package: "logstash{{ '=' if ansible_os_family == 'Debian' else '-' }}{{ logstash_version }}"

logstash_user: "{{ logstash.user | default('logstash') }}"
