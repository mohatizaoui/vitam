---
## Variables internes au rôle ; à ne pas surcharger par des variables plus globales

consul_folder_log: "{{ vitam_defaults.folder.root_path | default('/vitam') }}/log/consul"
consul_folder_data: "{{ vitam_defaults.folder.root_path | default('/vitam') }}/data/consul"

service_at_boot: "{{ vitam_defaults.services.at_boot | default(false) }}"

consul_version: "{{ consul.version | default('1.12.9-1') }}"
consul_package: "consul{{ '=' if ansible_os_family == 'Debian' else '-' }}{{ consul_version }}"
