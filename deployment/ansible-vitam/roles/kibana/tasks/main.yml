---

#### Kibana installation ####
- name: "Install {{ kibana_package }} package"
  package:
    name: "{{ kibana_package }}"
    state: present
  register: result
  retries: "{{ packages_install_retries_number }}"
  until: result is succeeded
  delay: "{{ packages_install_retries_delay }}"
  notify:
    - "kibana - restart service"
  when: install_mode != "container"

- name: Kibana configuration by templating
  template:
    src: kibana.yml.j2
    dest: /etc/kibana/kibana.yml
    owner: root
    group: root
    mode: 0644
  notify:
    - "kibana - restart service"
  when: install_mode != "container"

- name: Removed former systemd service file for kibana
  file:
    path: /etc/systemd/system/kibana.service
    state: absent
  notify:
    - "kibana - restart service"
  when: install_mode != "container"

- block:

  - name: Deploy systemd service file for kibana
    template:
      src: vitam-container-kibana.service.j2
      dest: "{{ '/lib/systemd/system' if ansible_os_family == 'Debian' else '/usr/lib/systemd/system' }}/kibana.service"
      owner: root
      group: root
      mode: "0644"
    notify: "kibana - restart service"

  - name: Create kibana group
    group:
      name: kibana
      state: present

  - name: Create kibana user
    user:
      name: kibana
      state: present

  - name: Check that the conf directory exists
    file:
      path: "{{ vitam_defaults.folder.root_path }}/conf/kibana"
      state: directory
      owner: kibana
      group: kibana
      mode: "0777"
    notify: "kibana - restart service"

  - name: Kibana configuration by templating
    template:
      src: kibana.yml.j2
      dest: "{{ vitam_defaults.folder.root_path }}/conf/kibana/kibana.yml"
      owner: root
      group: root
      mode: 0644
    notify: "kibana - restart service"

  when: install_mode == "container"

- name: Ensure Kibana log dir is OK
  file:
    path: "{{ vitam_defaults.folder.root_path }}/log/kibana/"
    state: directory
    owner: kibana
    group: kibana
    mode: "{{ '0777' if install_mode == 'container' else vitam_defaults.folder.folder_permission }}"

- name: Install logrotate package
  package:
    name: logrotate
    state: latest
  register: result
  retries: "{{ packages_install_retries_number }}"
  until: result is succeeded
  delay: "{{ packages_install_retries_delay }}"
  when: kibana.logrotate | default('enabled') | lower == 'enabled'

- name: Enable logrotate for Kibana
  template:
    src: logrotate.j2
    dest: /etc/logrotate.d/kibana
    owner: root
    group: root
    mode: 0644
  when: kibana.logrotate | default('enabled') | lower == 'enabled'

- name: Disable logrotate for Kibana
  file:
    path: /etc/logrotate.d/kibana
    state: absent
  when: kibana.logrotate | default('enabled') | lower == 'disabled'

#### Consul configuration ####
- name: Ensure consul config dir is OK
  file:
    path: "{{ consul_folder_conf }}"
    state: directory
    owner: "{{ vitam_defaults.users.vitam }}"
    group: "{{ vitam_defaults.users.group }}"
    mode: "{{ '0777' if install_mode == 'container' else vitam_defaults.folder.folder_permission }}"

- name: Deploy consul agent service declaration
  template:
    src: "service-kibana.json.j2"
    dest: "{{ consul_folder_conf }}/service-{{ kibana_service_name }}.json"
    owner: "{{ vitam_defaults.users.vitam }}"
    group: "{{ vitam_defaults.users.group }}"
    mode: "{{ '0644' if install_mode == 'container' else vitam_defaults.folder.conf_permission }}"
  tags:
    - consul_conf
  notify:
    - "kibana - reload consul configuration"

- meta: flush_handlers

- name: Make sure kibana is started & at boot
  systemd:
    name: kibana
    enabled: "{{ composant.at_boot | default(service_at_boot) }}"
    state: started

- name: Check kibana service health in local consul agent
  uri:
    url: "http://{{ (inventory_hostname in groups['hosts_consul_server']) | ternary(hostvars[inventory_hostname]['ip_admin'], '127.0.0.1') }}:8500/v1/agent/health/service/name/{{ kibana_service_name }}"
  register: result
  until:
    - result.status is defined
    - result.status == 200
  retries: "{{ vitam_defaults.services.status_retries_number }}"
  delay: "{{ vitam_defaults.services.status_retries_delay }}"
