---

- name: Add kibana filebeat module
  template:
    src: modules/kibana.yml.j2
    dest: /etc/filebeat/modules.d/kibana.yml
    mode: 0644
  when:
    - inventory_hostname in groups['hosts_kibana_data'] or
      inventory_hostname in groups['hosts_kibana_log']
  notify: "filebeat - restart service"

- name: Add elasticsearch filebeat module
  template:
    src: modules/elasticsearch.yml.j2
    dest: /etc/filebeat/modules.d/elasticsearch.yml
    mode: 0644
  when:
    - inventory_hostname in groups['hosts_elasticsearch_data'] or
      inventory_hostname in groups['hosts_elasticsearch_log']
  notify: "filebeat - restart service"

- name: Add logstash filebeat module
  template:
    src: modules/logstash.yml.j2
    dest: /etc/filebeat/modules.d/logstash.yml
    mode: 0644
  when:
    - inventory_hostname in groups['hosts_logstash']
  notify: "filebeat - restart service"

- name: Add mongodb filebeat module
  template:
    src: modules/mongodb.yml.j2
    dest: /etc/filebeat/modules.d/mongodb.yml
    mode: 0644
  when:
    - inventory_hostname in groups['hosts_mongos_data'] or
      inventory_hostname in groups['hosts_mongod_data'] or
      inventory_hostname in groups['hosts_mongoc_data'] or
      inventory_hostname in groups['hosts_mongos_offer'] or
      inventory_hostname in groups['hosts_mongod_offer'] or
      inventory_hostname in groups['hosts_mongoc_offer']
  notify: "filebeat - restart service"

- name: Add apache filebeat module
  copy:
    src: modules/apache.yml
    dest: /etc/filebeat/modules.d/apache.yml
    mode: 0644
  when: inventory_hostname in groups['reverse']
  notify: "filebeat - restart service"

- name: Add system filebeat module
  copy:
    src: modules/system.yml
    dest: /etc/filebeat/modules.d/system.yml
    mode: 0644
  notify: "filebeat - restart service"
