---

# https://www.mongodb.com/docs/v4.2/reference/command/isMaster/#output
- name: Check if the member is primary of the replicaset or not
  command: "mongosh --host {{ ip_service }} --port {{ mongo_port }} -u {{ mongodb[mongo_cluster_name].localadmin.user }} -p {{ mongodb[mongo_cluster_name].localadmin.password }} --quiet --eval 'rs.isMaster().ismaster'"
  register: primary_test_command
  no_log: "{{ hide_passwords_during_deploy }}"

- name: Copy reconfiguration database script when primary
  copy:
    src: reconfig.js
    dest: "{{ vitam_defaults.folder.root_path }}/script/{{ mongo_type }}"
    owner: "{{ vitam_defaults.users.vitamdb }}"
    group: "{{ vitam_defaults.users.group }}"
    mode: "{{ vitam_defaults.folder.conf_permission }}"
  when: primary_test_command.stdout == 'true'

- name: "Reconfigure replicaset for {{ mongo_type }}"
  command: "mongosh --host {{ ip_service }} --port {{ mongo_port }} -u {{ mongodb[mongo_cluster_name].localadmin.user }} -p {{ mongodb[mongo_cluster_name].localadmin.password }} --quiet --file {{ vitam_defaults.folder.root_path }}/script/{{ mongo_type }}/reconfig.js"
  no_log: "{{ hide_passwords_during_deploy }}"
  when: primary_test_command.stdout == 'true'
