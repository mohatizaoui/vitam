---

- name: "Get all archive profiles"
  uri:
    url: "{{ _archive_profiles_base_url }}"
    method: GET
    body:
      $query:
        $not:
          - $exists: SedaVersion
      $projection: { }
    body_format: "json"
    headers:
      Content-Type: "application/json"
      X-Tenant-Id: "{{ vitam_tenant_admin }}"
    client_cert: "{{ _tmp_pem }}"
    validate_certs: false
    return_content: yes
    status_code: 200
    timeout: 36000
  register: __get_archive_profiles_results

- include_tasks: archive_profile.yml
  with_items: "{{ __get_archive_profiles_results.json['$results'] }}"
  loop_control:
    loop_var: __profile
