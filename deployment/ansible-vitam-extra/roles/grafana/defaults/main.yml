---

grafana_user: grafana
grafana_group: grafana
grafana_path_provisioning: "{{ '/vitam/conf/grafana/provisioning' if install_mode == 'container' else '/etc/grafana/provisioning' }}"
grafana_data_dir: "{{ '/vitam/lib/grafana' if install_mode == 'container' else '/var/lib/grafana' }}"

service_at_boot: "{{ vitam_defaults.services.at_boot | default(false) }}"

grafana_version: "{{ grafana.version | default('10.3.5') }}"
grafana_package: "grafana{{ '=' if ansible_os_family == 'Debian' else '-' }}{{ grafana_version }}"
