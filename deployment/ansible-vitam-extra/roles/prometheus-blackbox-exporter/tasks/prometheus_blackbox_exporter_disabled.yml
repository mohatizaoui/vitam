---

- name: Remove vitam-blackbox-exporter package
  package:
    name: vitam-blackbox-exporter
    state: absent
  register: result
  retries: "{{ packages_install_retries_number | default(1) }}"
  until: result is succeeded
  delay: "{{ packages_install_retries_delay | default(10) }}"

- name: Remove systemd service file for blackbox_exporter
  file:
    path: "{{ '/lib/systemd/system' if ansible_distribution == 'Debian' else '/usr/lib/systemd/system' }}/vitam-blackbox-exporter.service"
    state: absent
    notify: daemon reload

- name: Remove consul agent service declaration for blackbox-exporter
  file:
    path: "{{ consul_folder_conf }}/service-blackbox-exporter.json"
    state: absent
  tags:
    - consul_conf
    - update_blackbox_exporter_configuration
  notify: "prometheus-blackbox-exporter - reload consul configuration"