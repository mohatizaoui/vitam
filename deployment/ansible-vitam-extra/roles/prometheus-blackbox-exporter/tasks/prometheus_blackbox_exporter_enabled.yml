---

#### Installation ####
- name: Install vitam-blackbox-exporter package
  package:
    name: vitam-blackbox-exporter
    state: latest
  register: result
  retries: "{{ packages_install_retries_number | default(1) }}"
  until: result is succeeded
  delay: "{{ packages_install_retries_delay | default(10) }}"
  notify: "prometheus-blackbox-exporter - restart service"

- name: Deploy systemd service file for vitam-blackbox-exporter
  template:
    src: vitam-blackbox-exporter.service.j2
    dest: "{{ '/lib/systemd/system' if ansible_distribution == 'Debian' else '/usr/lib/systemd/system' }}/vitam-blackbox-exporter.service"
    owner: root
    group: root
    mode: "0644"
  notify: "prometheus-blackbox-exporter - restart service"

#### Configuration ####
- name: Check that blackbox_exporter directories exist
  file:
    path: "{{ vitam_defaults.folder.root_path | default('/vitam') }}/{{ item }}/blackbox_exporter"
    state: directory
    owner: "{{ vitam_defaults.users.vitam | default('vitam') }}"
    group: "{{ vitam_defaults.users.group | default('vitam') }}"
    mode: "{{ vitam_defaults.folder.folder_permission | default('0750') }}"
  with_items:
    - app
    - bin
    - conf
    - lib
    - log
    - data
    - tmp
  notify: "prometheus-blackbox-exporter - restart service"

#### Consul configuration   ####

- name: Ensure consul config dir is OK
  file:
    path: "{{ consul_folder_conf }}"
    state: directory
    owner: "{{ vitam_defaults.users.vitam | default('vitam') }}"
    group: "{{ vitam_defaults.users.group | default('vitam') }}"
    mode: "{{ vitam_defaults.folder.folder_permission | default('0750') }}"

- name: Deploy consul agent service declaration
  template:
    src: "service-blackbox-exporter.json.j2"
    dest: "{{ consul_folder_conf }}/service-blackbox-exporter.json"
    owner: "{{ vitam_defaults.users.vitam | default('vitam') }}"
    group: "{{ vitam_defaults.users.group | default('vitam') }}"
    mode: "{{ vitam_defaults.folder.conf_permission | default('0640') }}"
  tags:
    - consul_conf
    - update_blackbox_exporter_configuration
  notify: "prometheus-blackbox-exporter - reload consul configuration"

#### blackbox configuration ####

- name: Deploy blackbox configuration
  template:
    src: "blackbox.yml.j2"
    dest: "{{ prometheus_blackbox_exporter_config_path }}/blackbox.yml"
    owner: "{{ vitam_defaults.users.vitam | default('vitam') }}"
    group: "{{ vitam_defaults.users.group | default('vitam') }}"
    mode: "{{ vitam_defaults.folder.conf_permission | default('0640') }}"
  tags:
    - blackbox_conf
  notify: "prometheus-blackbox-exporter - restart service"

# Ensure that the installation is complete
- meta: flush_handlers
  tags:
    - update_blackbox_exporter_configuration

- name: Ensure vitam-blackbox-exporter service is started
  service:
    name: vitam-blackbox-exporter
    state: started
    enabled: "{{ prometheus.blackbox_exporter.at_boot | default(service_at_boot) }}"

- name: Wait for blackbox_exporter port {{ prometheus.blackbox_exporter.port | default(9115) }} to be open
  wait_for:
    host: "{{ ip_admin }}"
    port: "{{ prometheus.blackbox_exporter.port | default(9115) }}"
    state: "started"
    timeout: "{{ vitam_defaults.services.start_timeout | default(300) }}"
