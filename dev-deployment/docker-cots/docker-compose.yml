version: "3"
services:
  elasticsearch:
    image: elasticsearch:8.17.4
    ports:
      - 9200:9200
      - 9300:9300
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
      - elastic_data:/usr/share/elasticsearch/data
  mongo:
    build:
      context: ./mongo
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: vitamdb-admin
      MONGO_INITDB_ROOT_PASSWORD: azerty
    volumes:
      - mongo_data:/data/db
  siegfried:
    image: keeps/siegfried:v1.9.6
    ports:
      - 19000:5138
    volumes:
      - /vitam:/vitam
      # Si /vitam est un lien symbolique, remplacer la première partie par la destination du lien. Par exemple :
      # - /Users/ebernard/IdeaProjects/vitam/basedir:/vitam
  mongo-express:
    image: mongo-express
    ports:
      - 8888:8081
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: ''
      ME_CONFIG_MONGODB_ADMINUSERNAME: vitamdb-admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: azerty
      ME_CONFIG_MONGODB_SERVER: mongo
volumes:
  elastic_data:
  mongo_data:
